name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      # npm >= 11.5 is required for OIDC trusted publishing; pinned for
      # supply-chain reproducibility in the release path.
      - name: Pin npm CLI
        run: npm install -g npm@11.17.0

      - run: pnpm install --frozen-lockfile
      - run: pnpm run ci

      # lib/ was built and gated by `pnpm run ci`; --ignore-scripts keeps
      # lifecycle scripts out of the publish step itself.
      - name: Publish with provenance
        run: npm publish --access public --provenance --ignore-scripts

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run test
      - run: pnpm run format:check
      - run: pnpm run build
      - name: Verify worklet directives survive the build
        run: grep -rlE "['\"]worklet['\"]" lib/module --include="*.js" | head -1 || (echo "No worklet directives in build output" && exit 1)

name: Feature Request
description: Suggest an API, behavior, or integration.
title: "[feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user workflow or app case is blocked today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What API or behavior would solve it?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: What workarounds or existing packages have you tried?
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: This can be added without a new required runtime dependency.
        - label: This preserves the one-gesture long-press, drag, release interaction.
        - label: This should be an optional helper or subpath export if it depends on another library.
